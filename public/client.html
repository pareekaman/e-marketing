<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Client Portal — E-Marketing</title>
<link rel="icon" type="image/png" href="emarketing-logo.png"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#f5f6fa;color:#0f172a;min-height:100vh;}
.topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:12px 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-left img{width:34px;height:34px;object-fit:cover;border-radius:6px;}
.topbar-title{font-weight:700;color:#0f172a;font-size:16px;}
.topbar-sub{font-size:11px;color:#64748b;}
.logout-btn{padding:8px 14px;border:1.5px solid #e2e8f0;background:#fff;border-radius:8px;font-size:13px;font-weight:600;color:#475569;cursor:pointer;transition:background .15s,border-color .15s;font-family:inherit;}
.logout-btn:hover{background:#fef2f2;border-color:#fca5a5;color:#dc2626;}
.cp-sidebar{width:62px;background:#0f172a;position:fixed;top:0;left:0;bottom:0;z-index:100;display:flex;flex-direction:column;transition:width .25s ease;overflow:hidden;}
.cp-sidebar:hover{width:212px;}
.cp-brand{display:flex;align-items:center;gap:10px;padding:14px 13px;border-bottom:1px solid rgba(255,255,255,.08);min-height:60px;white-space:nowrap;overflow:hidden;}
.cp-brand img{width:34px;height:34px;border-radius:8px;object-fit:cover;flex-shrink:0;background:#fff;}
.cp-brand-text{opacity:0;transition:opacity .2s .1s;white-space:nowrap;}
.cp-sidebar:hover .cp-brand-text{opacity:1;}
.cp-brand-title{font-weight:800;font-size:14px;color:#fff;line-height:1.1;}
.cp-brand-sub{font-size:10.5px;color:#94a3b8;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cp-nav{display:flex;flex-direction:column;gap:3px;padding:10px 9px;flex:1;overflow:hidden;}
.cp-nav-item{display:flex;align-items:center;gap:11px;padding:11px 11px;border:none;background:none;border-radius:8px;font-size:13.5px;font-weight:500;color:#94a3b8;cursor:pointer;font-family:inherit;text-align:left;white-space:nowrap;overflow:hidden;transition:background .2s,color .2s;}
.cp-nav-item:hover{background:rgba(255,255,255,.06);color:#e2e8f0;}
.cp-nav-item.active{background:rgba(59,130,246,.2);color:#60a5fa;}
.cp-nav-ico{font-size:17px;width:22px;text-align:center;flex-shrink:0;}
.cp-nav-label{opacity:0;transition:opacity .2s .1s;}
.cp-sidebar:hover .cp-nav-label{opacity:1;}
.cp-sidebar .logout-btn{display:flex;align-items:center;gap:11px;margin:10px 9px;padding:11px;border-radius:8px;border:none;background:none;color:#f87171;font-family:'Inter',sans-serif;font-size:13.5px;font-weight:500;cursor:pointer;white-space:nowrap;overflow:hidden;transition:background .2s;}
.cp-sidebar .logout-btn:hover{background:rgba(248,113,113,.1);border-color:transparent;color:#f87171;}
.cp-logout-label{opacity:0;transition:opacity .2s .1s;}
.cp-sidebar:hover .cp-logout-label{opacity:1;}
.cp-main{margin-left:62px;min-height:100vh;padding:16px 22px;overflow-x:hidden;}
@media(max-width:760px){ .cp-main{margin-left:62px;} }
.cp-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:12px;}
.cp-content-top{display:grid;grid-template-columns:250px minmax(0,1fr) 300px;gap:12px;margin-bottom:12px;align-items:stretch;}
.cp-card{background:#fff;border:1px solid #e8eaf0;border-radius:13px;box-shadow:0 1px 3px rgba(16,24,40,.04);display:flex;flex-direction:column;overflow:hidden;}
.cp-card-head{padding:11px 15px;border-bottom:1px solid #eef1f6;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.cp-card-head h4{font-size:13px;font-weight:700;color:#0f172a;margin:0;}
.cp-scroll{overflow-y:auto;}
.cp-scroll::-webkit-scrollbar{width:6px;}
.cp-scroll::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px;}
@media(max-width:1080px){.cp-stats{grid-template-columns:repeat(2,1fr);}.cp-content-top{grid-template-columns:1fr;}}
.btn{padding:8px 16px;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;border:none;font-family:inherit;transition:transform .1s,box-shadow .15s;}
.btn:hover{transform:translateY(-1px);}
.btn-primary{background:#1a56db;color:#fff;}
.btn-outline{background:#fff;color:#475569;border:1.5px solid #e2e8f0;}
.btn-outline:hover{background:#f8fafc;}
.task-table-card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;overflow:hidden;}
.card-head{padding:14px 18px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;}
.card-head-title{font-size:14px;font-weight:700;}
table{width:100%;border-collapse:collapse;font-size:13px;}
table th{text-align:left;padding:10px 14px;font-size:11px;font-weight:700;color:#64748b;letter-spacing:.4px;text-transform:uppercase;border-bottom:1px solid #e2e8f0;}
table td{padding:10px 14px;border-bottom:1px solid #f1f5f9;color:#1e293b;}
.empty{text-align:center;color:#94a3b8;padding:20px;font-size:13px;}
.alert.error{background:#fef2f2;color:#991b1b;padding:10px 14px;border-radius:8px;border:1px solid #fca5a5;font-size:13px;margin-bottom:12px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:none;align-items:center;justify-content:center;padding:14px;}
.modal-overlay.open{display:flex;}
.modal{position:relative;background:#fff;border-radius:14px;padding:24px;width:520px;max-width:95vw;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal-close{position:absolute;top:10px;right:10px;width:30px;height:30px;border-radius:50%;background:#f1f5f9;color:#64748b;border:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;padding:0;}
.modal h3{margin-bottom:14px;font-size:18px;}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:14px;border-top:1px solid #f1f5f9;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-group{margin-bottom:14px;}
.form-group label{font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;font-family:inherit;outline:none;color:#1e293b;background:#fff;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#3b82f6;}
#toast{position:fixed;bottom:30px;right:30px;background:#0f172a;color:#fff;padding:12px 18px;border-radius:8px;font-size:13px;z-index:2000;box-shadow:0 10px 25px rgba(0,0,0,.18);display:none;}
#toast.show{display:block;animation:slideIn .25s ease;}
@keyframes slideIn{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
@media (max-width:720px){
  .main{padding:14px;}
  .form-row{grid-template-columns:1fr;}
}
.cp-star-row{display:flex;gap:8px;margin:8px 0;}
.cp-star{font-size:34px;cursor:pointer;color:#e2e8f0;transition:color .15s,transform .1s;line-height:1;}
.cp-star.lit{color:#f59e0b;}
.cp-star:hover{transform:scale(1.15);}
</style>
</head>
<body>

<div class="cp-layout">
  <aside class="cp-sidebar">
    <div class="cp-brand">
      <img src="emarketing-logo.png" alt="Logo" onerror="this.style.display='none'"/>
      <div class="cp-brand-text">
        <div class="cp-brand-title">Client Portal</div>
        <div class="cp-brand-sub" id="topbarSub">E-Marketing</div>
      </div>
    </div>
    <nav class="cp-nav">
      <button class="cp-nav-item active" id="cpNavDashboard" onclick="cpNav('dashboard')"><span class="cp-nav-ico">🏠</span><span class="cp-nav-label">Dashboard</span></button>
      <button class="cp-nav-item" id="cpNavAbout" onclick="cpNav('about')"><span class="cp-nav-ico">ℹ️</span><span class="cp-nav-label">About Us</span></button>
      <button class="cp-nav-item" id="cpNavFeedback" onclick="cpNav('feedback')"><span class="cp-nav-ico">⭐</span><span class="cp-nav-label">Escalation</span></button>
      <button class="cp-nav-item" id="cpNavProfile" onclick="cpNav('profile')"><span class="cp-nav-ico">👤</span><span class="cp-nav-label">Profile</span></button>
    </nav>
    <button class="logout-btn" onclick="logout()"><span class="cp-nav-ico">↩</span><span class="cp-logout-label">Logout</span></button>
  </aside>
  <main class="cp-main">
    <div id="cpDashboard"><div id="cpContent"><div class="empty" style="padding:60px">Loading…</div></div></div>
    <div id="cpAbout" style="display:none"></div>
    <div id="cpFeedback" style="display:none"></div>
    <div id="cpProfile" style="display:none"></div>
  </main>
</div>

<!-- Delegate task modal -->
<div class="modal-overlay" id="clientDelegateModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('clientDelegateModal')">×</button>
    <h3>＋ Assign Task to Your Handler</h3>
    <div class="alert error" id="cpDelErr" style="display:none"></div>
    <div class="form-group">
      <label>Handler (auto-assigned)</label>
      <input type="text" id="cpDelHandler" readonly style="background:#f8fafc;color:#475569;font-weight:600"/>
    </div>
    <div class="form-group">
      <label>Description *</label>
      <textarea id="cpDelDesc" rows="3" placeholder="What needs to be done?"></textarea>
    </div>
    <div class="form-group">
      <label>Priority</label>
      <select id="cpDelPriority">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
        <option value="urgent">Urgent</option>
      </select>
      <div style="margin-top:6px;font-size:12px;color:#64748b">🗓 Due date will be defined by Handler</div>
    </div>
    <div class="form-group">
      <label>Remarks</label>
      <textarea id="cpDelRemarks" rows="2" placeholder="Optional notes"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('clientDelegateModal')">Cancel</button>
      <button class="btn btn-primary" onclick="cpSaveDelegate()">Send to Handler</button>
    </div>
  </div>
</div>

<!-- Task detail modal — includes sub-tasks (follow-up asks under this task) -->
<div class="modal-overlay" id="cpTaskDetailModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('cpTaskDetailModal')">×</button>
    <h3 id="cpTdTitle">📋 Task Detail</h3>
    <div id="cpTdBody" style="margin-top:14px;display:flex;flex-direction:column;gap:10px"></div>
    <div id="cpTdSubtasksSection" style="margin-top:14px;padding-top:14px;border-top:1px solid #e2e8f0">
      <div style="font-size:12px;font-weight:700;color:#0f172a;margin-bottom:8px">🧩 Sub-tasks</div>
      <div id="cpTdSubtasksList" style="display:flex;flex-direction:column;gap:6px;margin-bottom:10px;font-size:13px;color:#94a3b8">Loading…</div>
      <div style="display:flex;gap:6px">
        <input type="text" id="cpTdNewSubtask" placeholder="Add a related task" style="flex:1;padding:7px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px" onkeydown="if(event.key==='Enter'){cpAddSubtask()}"/>
        <select id="cpTdNewSubtaskPriority" style="padding:7px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px">
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
          <option value="urgent">Urgent</option>
        </select>
        <button class="btn btn-primary" style="padding:6px 14px;font-size:12px" onclick="cpAddSubtask()">Add</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('cpTaskDetailModal')">Close</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Utilities ────────────────────────────────────────────────────────
function dtEscape(s){ return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtDate(s){ if(!s) return ''; const [y,m,d]=String(s).split('T')[0].split('-'); return `${d}-${m}-${y}`; }
function showToast(msg, type){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.background = type==='error' ? '#dc2626' : '#0f172a';
  t.classList.add('show');
  clearTimeout(window._toastTo);
  window._toastTo = setTimeout(()=>t.classList.remove('show'), 2800);
}
function showConfirm(msg, onConfirm){
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:10000;display:flex;align-items:center;justify-content:center';
  overlay.innerHTML = `
    <div style="background:#fff;border-radius:16px;padding:28px 32px;max-width:340px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,.18);text-align:center">
      <div style="font-size:32px;margin-bottom:10px">🗑️</div>
      <div style="font-size:15px;font-weight:700;color:#0f172a;margin-bottom:6px">Are you sure?</div>
      <div style="font-size:13px;color:#64748b;margin-bottom:22px">${msg}</div>
      <div style="display:flex;gap:10px">
        <button id="_cfmCancel" style="flex:1;padding:10px;border:1.5px solid #e2e8f0;background:#fff;color:#374151;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer">Cancel</button>
        <button id="_cfmOk" style="flex:1;padding:10px;border:none;background:#dc2626;color:#fff;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer">Delete</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  const close = () => overlay.remove();
  overlay.querySelector('#_cfmCancel').onclick = close;
  overlay.querySelector('#_cfmOk').onclick = () => { close(); onConfirm(); };
  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
}
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
async function api(url, method='GET', body=null){
  const token = localStorage.getItem('authToken');
  const opts = { method, headers: {'Content-Type':'application/json'}, credentials:'include' };
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  if (body)  opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  if (r.status === 401) {
    localStorage.removeItem('authToken');
    window.location.replace('/');
    return {};
  }
  return r.json();
}
async function logout(){
  try { await fetch('/api/logout', { method:'POST', credentials:'include' }); } catch(e){}
  localStorage.removeItem('authToken');
  window.location.replace('/');
}

// Gradient initials avatar (matches admin Client Master palette).
const CP_AVATAR_PALETTE = [
  ['#ff6b6b','#ee5a6f'],['#4ecdc4','#44a39c'],['#a78bfa','#7c3aed'],
  ['#fbbf24','#f59e0b'],['#34d399','#10b981'],['#60a5fa','#3b82f6'],
  ['#f472b6','#ec4899'],['#fb923c','#ea580c'],['#22d3ee','#0891b2']
];
function cpAvatarStyle(name){
  let h = 0;
  for (let i=0; i<name.length; i++) h = (h*31 + name.charCodeAt(i)) >>> 0;
  const [a,b] = CP_AVATAR_PALETTE[h % CP_AVATAR_PALETTE.length];
  return `background:linear-gradient(135deg,${a},${b});`;
}
function cpInitials(name){
  const parts = name.trim().split(/\s+/).slice(0,2);
  return parts.map(p => p[0] || '').join('').toUpperCase() || '?';
}

// ── State + boot ─────────────────────────────────────────────────────
let _cpMe = null;
let _cpUser = null;
let _cpStats = null;
let _cpPage = 'dashboard';
let _cpStatusChart = null;

// Sidebar navigation between Dashboard / About Us / Profile.
function cpNav(page){
  _cpPage = page;
  ['dashboard','about','feedback','profile'].forEach(p => {
    const pg = document.getElementById('cp' + p.charAt(0).toUpperCase() + p.slice(1));
    if (pg) pg.style.display = (p === page) ? 'block' : 'none';
    const nav = document.getElementById('cpNav' + p.charAt(0).toUpperCase() + p.slice(1));
    if (nav) nav.classList.toggle('active', p === page);
  });
  if (page === 'about')    document.getElementById('cpAbout').innerHTML    = cpRenderAbout(_cpStats || {});
  if (page === 'profile')  document.getElementById('cpProfile').innerHTML  = cpRenderProfile(_cpStats || {}, _cpUser || {});
  if (page === 'feedback') cpLoadFeedbackPage();
}

(async function init(){
  // Auth gate: must be logged in AND role=client; otherwise bounce.
  try {
    const me = await api('/api/me');
    if (!me || !me.id) { window.location.replace('/'); return; }
    if (me.role !== 'client') { window.location.replace('/app'); return; }
    _cpUser = me;
    document.getElementById('topbarSub').textContent = me.name || 'E-Marketing';
    loadClientPortal();
  } catch (e) {
    window.location.replace('/');
  }
})();

async function loadClientPortal(from, to){
  const wrap = document.getElementById('cpContent');
  wrap.innerHTML = '<div class="empty" style="padding:60px">Loading…</div>';
  try {
    const qs = (from && to) ? `?from=${from}&to=${to}` : '';
    const s = await api('/api/client-portal/stats' + qs);
    if (s.error) { wrap.innerHTML = `<div class="empty" style="padding:60px;color:#dc2626">${s.error}</div>`; return; }
    _cpMe = s.client || {};
    _cpStats = s;
    wrap.innerHTML = cpRenderHtml(s);
    setTimeout(()=>cpRenderCharts(s), 0);
    // Keep the currently-open About/Profile page fresh after a data reload.
    if (_cpPage === 'about')   document.getElementById('cpAbout').innerHTML   = cpRenderAbout(s);
    if (_cpPage === 'profile') document.getElementById('cpProfile').innerHTML = cpRenderProfile(s, _cpUser || {});
  } catch(e) {
    wrap.innerHTML = `<div class="empty" style="padding:60px;color:#dc2626">Failed to load: ${e.message||'error'}</div>`;
  }
}

function cpApplyRange(){
  loadClientPortal(document.getElementById('cpFrom')?.value, document.getElementById('cpTo')?.value);
}

function cpRenderHtml(s){
  const client = s.client || {};
  const del = s.delegation || {}, chl = s.checklist || {};
  const meet = s.meetings || {};
  const range = s.range || {};
  const tasksTotal     = (parseInt(del.total)||0)     + (parseInt(chl.total)||0);
  const pendingTotal   = (parseInt(del.pending)||0)   + (parseInt(chl.pending)||0);
  const completedTotal = (parseInt(del.completed)||0) + (parseInt(chl.completed)||0);
  const overdueTotal   = (parseInt(del.overdue)||0)   + (parseInt(chl.overdue)||0);
  const revisedTotal   = parseInt(del.revised)||0;
  const meetingsTotal     = parseInt(meet.total)||0;
  const meetingsScheduled = parseInt(meet.scheduled)||0;
  const meetingsCancelled = parseInt(meet.cancelled)||0;
  const completionPct = tasksTotal > 0 ? Math.round((completedTotal / tasksTotal) * 100) : 0;
  const canDelegate = !!client.handler_id;

  const initials = dtEscape(cpInitials(client.name || 'C'));
  const avatarStyle = cpAvatarStyle(client.name || 'C');
  const avatarHtml = client.logo_url
    ? `<img src="${client.logo_url}" alt="${dtEscape(client.name)}" style="width:54px;height:54px;border-radius:14px;object-fit:cover;box-shadow:0 4px 12px rgba(0,0,0,.12);flex-shrink:0;background:#fff"/>`
    : `<div style="width:54px;height:54px;border-radius:14px;${avatarStyle};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:21px;box-shadow:0 4px 12px rgba(0,0,0,.12);flex-shrink:0">${initials}</div>`;
  const istHour = (new Date(Date.now() + (5.5*60*60*1000))).getUTCHours();
  const greeting = istHour < 12 ? 'Good morning' : istHour < 17 ? 'Good afternoon' : 'Good evening';
  const handlerLine = client.handler_name
    ? `<div style="display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.92);color:#0f766e;padding:8px 14px;border-radius:999px;font-weight:600;font-size:13px;box-shadow:0 1px 3px rgba(0,0,0,.06)">
         <div style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#14b8a6,#0d9488);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700">${dtEscape(cpInitials(client.handler_name))}</div>
         <span>Handler: <strong>${dtEscape(client.handler_name)}</strong></span>
         ${client.handler_email ? `<span style="color:#64748b;font-weight:500">· ${dtEscape(client.handler_email)}</span>` : ''}
       </div>`
    : `<div style="display:inline-flex;align-items:center;gap:6px;background:#fef2f2;color:#991b1b;padding:8px 14px;border-radius:999px;font-weight:600;font-size:13px;border:1px solid #fecaca">⚠️ No handler assigned — contact admin before delegating tasks</div>`;

  const priorityRank = { urgent: 4, high: 3, medium: 2, low: 1 };
  const recentSorted = [...(s.recent || [])].sort((a, b) =>
    (priorityRank[b.priority] || 0) - (priorityRank[a.priority] || 0));
  window._cpRecentMap = {};
  recentSorted.forEach(t => { if (t.id) window._cpRecentMap[`${t.type}-${t.id}`] = t; });
  const recentHtml = recentSorted.length
    ? recentSorted.map(t => {
        const typeBadge = t.type === 'checklist'
          ? `<span style="font-size:10px;background:#f0fdf4;color:#16a34a;padding:3px 9px;border-radius:10px;font-weight:700;letter-spacing:.3px">✅ CHECKLIST</span>`
          : `<span style="font-size:10px;background:#eff6ff;color:#1d4ed8;padding:3px 9px;border-radius:10px;font-weight:700;letter-spacing:.3px">📋 DELEGATION</span>`;
        const statusPill = t.status === 'completed'

// System Links — per-client quick links configured by admin. Replaces the old
// Upcoming Deadlines card on the dashboard.
function cpRenderSystemLinksHtml(links){
  links = Array.isArray(links) ? links : [];
  if (!links.length) {
    return `<div class="cp-card" style="height:230px">
      <div class="cp-card-head"><h4>🔗 System Links</h4></div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#94a3b8;text-align:center;padding:0 16px">
        <div style="font-size:30px;margin-bottom:6px">🔗</div>
        <div style="font-size:12px">No links yet — your handler will add your systems here.</div>
      </div>
    </div>`;
  }
  const favicon = url => {
    try { const h = new URL(url).hostname; return `https://www.google.com/s2/favicons?domain=${h}&sz=32`; }
    catch { return ''; }
  };
  const rows = links.map(l => {
    const safeUrl = /^https?:\/\//i.test(l.url) ? l.url : 'https://' + l.url;
    const ic = favicon(safeUrl);
    const dateLine = l.liveDate
      ? `<div style="font-size:11px;color:#0f766e;margin-top:1px">🟢 Live: ${fmtDate(l.liveDate)}</div>`
      : '';
    return `<div style="display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid #f1f5f9">
      <span style="width:26px;height:26px;border-radius:7px;background:#eff6ff;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden">${ic ? `<img src="${ic}" style="width:18px;height:18px" onerror="this.parentNode.textContent='🔗'"/>` : '🔗'}</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600;color:#0f172a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${dtEscape(l.label||'')}</div>
        ${dateLine}
      </div>
      <a href="${dtEscape(safeUrl)}" target="_blank" rel="noopener" style="flex-shrink:0;background:#1a56db;color:#fff;font-size:12px;font-weight:600;padding:6px 12px;border-radius:7px;text-decoration:none;white-space:nowrap">Open ↗</a>
    </div>`;
  }).join('');
  return `<div class="cp-card" style="height:230px">
    <div class="cp-card-head"><h4>🔗 System Links</h4><span style="font-size:11px;color:#94a3b8">${links.length} link${links.length===1?'':'s'}</span></div>
    <div class="cp-scroll" style="flex:1">${rows}</div>
  </div>`;
}

async function cpChangePassword(){
  const err = document.getElementById('cpPwErr');
  err.style.display = 'none';
  const currentPassword = document.getElementById('cpPwCurrent').value;
  const newPassword     = document.getElementById('cpPwNew').value;
  const confirm         = document.getElementById('cpPwConfirm').value;
  if (!currentPassword) { err.textContent = 'Enter your current password'; err.style.display = 'block'; return; }
  if (!newPassword || newPassword.length < 6) { err.textContent = 'New password must be at least 6 characters'; err.style.display = 'block'; return; }
  if (newPassword !== confirm) { err.textContent = 'New passwords do not match'; err.style.display = 'block'; return; }
  const r = await api('/api/client-portal/password', 'PUT', { currentPassword, newPassword });
  if (r.error) { err.textContent = r.error; err.style.display = 'block'; return; }
  showToast('🔒 Password updated');
  document.getElementById('cpPwCurrent').value = '';
  document.getElementById('cpPwNew').value = '';
  document.getElementById('cpPwConfirm').value = '';
}

function cpRenderCharts(s){
  if (_cpStatusChart) { try { _cpStatusChart.destroy(); } catch{} _cpStatusChart = null; }
  const del = s.delegation || {}, chl = s.checklist || {};
  const pending   = (parseInt(del.pending)||0)   + (parseInt(chl.pending)||0);
  const completed = (parseInt(del.completed)||0) + (parseInt(chl.completed)||0);
  const revised   = parseInt(del.revised)||0;
  const c = document.getElementById('cpStatusChart');
  if (c && (pending + completed + revised > 0)) {
    _cpStatusChart = new Chart(c.getContext('2d'), {
      type: 'doughnut',
      data: { labels: ['Completed','Pending','Revised'],
              datasets: [{ data: [completed, pending, revised],
                           backgroundColor: ['#10b981','#ef4444','#f59e0b'],
                           borderWidth: 3, borderColor: '#fff', hoverOffset: 8 }] },
      options: { responsive: true, maintainAspectRatio: false, cutout: '64%',
                 layout: { padding: 4 },
                 plugins: { legend: { position: 'bottom', labels: { font: { size: 11 }, padding: 10, boxWidth: 12, usePointStyle: true } },
                            tooltip: { callbacks: { label: c => ` ${c.label}: ${c.raw}` } } } }
    });
  }
}

// ── Delegate task to handler ─────────────────────────────────────────
function cpOpenDelegate(){
  if (!_cpMe?.handler_id) { showToast('No handler assigned — contact admin', 'error'); return; }
  document.getElementById('cpDelErr').style.display = 'none';
  document.getElementById('cpDelHandler').value = _cpMe.handler_name || '';
  document.getElementById('cpDelDesc').value = '';
  document.getElementById('cpDelRemarks').value = '';
  document.getElementById('cpDelPriority').value = 'low';
  document.getElementById('clientDelegateModal').classList.add('open');
}

async function cpSaveDelegate(){
  const err = document.getElementById('cpDelErr');
  err.style.display = 'none';
  const desc = document.getElementById('cpDelDesc').value.trim();
  const priority = document.getElementById('cpDelPriority').value;
  const remarks = document.getElementById('cpDelRemarks').value.trim();
  if (!desc) { err.textContent = 'Description required'; err.style.display = 'block'; return; }
  const r = await api('/api/tasks', 'POST', { type:'delegation', desc, priority, remarks, approval:'no', doerSetsDueDate:true });
  if (r.error) { err.textContent = r.error; err.style.display = 'block'; return; }
  showToast('✅ Task sent to your handler');
  closeModal('clientDelegateModal');
  loadClientPortal();
}

// ── Task detail + sub-tasks (follow-up asks nested under a task, e.g.
// "make a dashboard" then later "change its color") ──────────────────
let _cpTdTaskId = null;

function cpOpenTaskDetail(key){
  const t = window._cpRecentMap?.[key];
  if (!t) return;
  const row = (label, value) => value
    ? `<div style="display:flex;gap:10px;align-items:flex-start;border-bottom:1px solid #f1f5f9;padding-bottom:8px">
        <span style="min-width:90px;color:#64748b;font-size:12px;font-weight:600">${label}</span>
        <span style="flex:1;word-break:break-word">${value}</span>
      </div>`
    : '';
  const priorityColors = { urgent: ['#fef2f2','#dc2626'], high: ['#fffbeb','#92400e'], medium: ['#eff6ff','#1d4ed8'], low: ['#f0fdf4','#16a34a'] };
  const [prBg, prFg] = priorityColors[t.priority] || priorityColors.low;
  const statusHtml = t.status === 'completed'
    ? '<span style="color:#15803d;font-weight:700">✓ Done</span>'
    : t.status === 'revised'
    ? '<span style="color:#9d174d;font-weight:700">🔄 Revised</span>'
    : '<span style="color:#b91c1c;font-weight:700">⏳ Pending</span>';
  document.getElementById('cpTdTitle').textContent = '📋 ' + (t.description || 'Task Detail');
  document.getElementById('cpTdBody').innerHTML = [
    row('Doer', dtEscape(t.doer || '—')),
    row('Priority', `<span style="font-size:11px;color:${prFg};font-weight:700;background:${prBg};padding:3px 9px;border-radius:10px;text-transform:capitalize">${dtEscape(t.priority || 'low')}</span>`),
    row('Due Date', fmtDate(t.due_date || '') || '<span style="color:#94a3b8">Not set yet</span>'),
    row('Status', statusHtml),
  ].filter(Boolean).join('');
  const subSection = document.getElementById('cpTdSubtasksSection');
  const isDelegation = t.type === 'delegation';
  subSection.style.display = isDelegation ? '' : 'none';
  document.getElementById('cpTaskDetailModal').classList.add('open');
  if (isDelegation) { _cpTdTaskId = t.id; cpLoadSubtasks(); }
}

async function cpLoadSubtasks(){
  const wrap = document.getElementById('cpTdSubtasksList');
  if (!wrap || !_cpTdTaskId) return;
  wrap.innerHTML = 'Loading…';
  const r = await api(`/api/tasks/${_cpTdTaskId}/subtasks`);
  if (!wrap.isConnected) return; // modal closed before the fetch resolved
  if (r.error) { wrap.innerHTML = `<span style="color:#dc2626">${dtEscape(r.error)}</span>`; return; }
  const items = r.subtasks || [];
  const priorityColors = { urgent: ['#fef2f2','#dc2626'], high: ['#fffbeb','#92400e'], medium: ['#eff6ff','#1d4ed8'], low: ['#f0fdf4','#16a34a'] };
  wrap.innerHTML = items.length ? items.map(s => {
    const [prBg, prFg] = priorityColors[s.priority] || priorityColors.low;
    return `
    <div style="padding:6px 0;border-bottom:1px solid #f8fafc">
      <div style="display:flex;align-items:center;gap:8px;color:#0f172a">
        <span style="flex:1;word-break:break-word;${s.status==='completed'?'text-decoration:line-through;color:#94a3b8':''}">${dtEscape(s.description)}</span>
        <span style="font-size:10px;color:${prFg};font-weight:700;background:${prBg};padding:2px 8px;border-radius:8px;text-transform:capitalize">${dtEscape(s.priority||'low')}</span>
        ${s.status==='completed'
          ? '<span style="font-size:10px;color:#15803d;font-weight:700;background:#dcfce7;padding:2px 8px;border-radius:8px">✓ Done</span>'
          : '<span style="font-size:10px;color:#b91c1c;font-weight:700;background:#fee2e2;padding:2px 8px;border-radius:8px">⏳ Pending</span>'}
      </div>
      <div style="font-size:11px;color:#94a3b8;margin-top:2px">
        Delegated: ${fmtDate(s.created_at)}${s.status==='completed' && s.completed_at ? ` · Done: ${fmtDate(s.completed_at)}` : ''}
      </div>
    </div>`;
  }).join('') : `<span style="color:#94a3b8">No sub-tasks yet</span>`;
}

async function cpAddSubtask(){
  const input = document.getElementById('cpTdNewSubtask');
  const description = input.value.trim();
  const priority = document.getElementById('cpTdNewSubtaskPriority').value;
  if (!description || !_cpTdTaskId) return;
  const r = await api(`/api/tasks/${_cpTdTaskId}/subtasks`, 'POST', { description, priority });
  if (r.error) { showToast(r.error, 'error'); return; }
  input.value = '';
  cpLoadSubtasks();
}

// ── Client Feedback ───────────────────────────────────────────────────
let _cpFbRating = 0;
let _cpFbHandlers = [];
let _cpFbHodMap = {};
let _cpFbFixed = [];
let _cpFbEditId = null; // null = new submission, number = editing existing

async function cpLoadFeedbackPage(){
  const wrap = document.getElementById('cpFeedback');
  if (!wrap) return;
  wrap.innerHTML = '<div class="empty" style="padding:40px">Loading…</div>';
  try {
    const [hr, fbr] = await Promise.all([
      api('/api/client-portal/handlers'),
      api('/api/client-portal/feedback')
    ]);
    if (hr.error) { wrap.innerHTML = `<div class="empty" style="color:#dc2626">${dtEscape(hr.error)}</div>`; return; }
    _cpFbHandlers = hr.handlers || [];
    _cpFbHodMap   = hr.hodMap   || {};
    _cpFbFixed    = hr.fixedRecipients || [];
    _cpFbRating   = 0;
    _cpFbEditId   = null;
    const history = Array.isArray(fbr) ? fbr : [];
    wrap.innerHTML = cpRenderFeedbackPage(history);
  } catch(e) {
    wrap.innerHTML = `<div class="empty" style="color:#dc2626">Failed to load: ${e.message}</div>`;
  }
}

function cpFbGetHods(dept){
  return Array.isArray(_cpFbHodMap[dept]) ? _cpFbHodMap[dept] : [];
}

function cpRenderFeedbackPage(history){
  const handlers = _cpFbHandlers;
  if (!handlers.length) return `<div class="cp-card" style="max-width:560px;margin:0 auto;padding:32px;text-align:center;color:#64748b"><div style="font-size:36px;margin-bottom:10px">🤝</div><div>No handlers assigned to your account yet.</div></div>`;

  const handlerSection = handlers.length === 1
    ? `<div style="background:#f8fafc;border-radius:10px;padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;gap:12px">
        <div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#1a56db,#7c3aed);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0">${dtEscape(cpInitials(handlers[0].name))}</div>
        <div><div style="font-weight:700;color:#0f172a;font-size:14px">${dtEscape(handlers[0].name)}</div><div style="font-size:12px;color:#64748b">${dtEscape(handlers[0].department||'—')}</div></div>
        <input type="hidden" id="cpFbEmployee" value="${handlers[0].id}"/>
       </div>`
    : `<div class="form-group" style="margin-bottom:20px">
        <label>Select Employee</label>
        <select id="cpFbEmployee" onchange="cpFbHandlerChange()" style="width:100%">
          ${handlers.map(h=>`<option value="${h.id}" data-dept="${dtEscape(h.department||'')}" data-is-hod="${h.is_hod?'1':'0'}">${dtEscape(h.name)} — ${dtEscape(h.department||'')}</option>`).join('')}
        </select>
       </div>`;

  const firstHods = handlers[0].is_hod ? [] : cpFbGetHods(handlers[0].department || '');
  const recipientRows = cpBuildRecipientRows(firstHods, handlers[0].id);

  // Past feedback history cards
  const historyHtml = history.length ? history.map(f => {
    const stars = '★'.repeat(f.rating) + '☆'.repeat(5 - f.rating);
    const col = f.rating >= 4 ? '#10b981' : f.rating === 3 ? '#f59e0b' : '#ef4444';
    const date = new Date(f.created_at).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
    return `<div id="cpFbHistCard-${f.id}" style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:16px 18px;display:flex;flex-direction:column;gap:8px">
      <div style="display:flex;justify-content:space-between;align-items:start;gap:8px">
        <div>
          <div style="font-weight:700;color:#0f172a;font-size:14px">${dtEscape(f.employee_name)}</div>
          <div style="font-size:11px;color:#64748b">${dtEscape(f.department||'—')}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="font-size:18px;color:${col};letter-spacing:1px">${stars}</div>
          <button onclick="cpFbStartEdit(${f.id})" style="background:#eff6ff;border:none;color:#1a56db;font-size:12px;font-weight:600;padding:5px 10px;border-radius:7px;cursor:pointer">✏️ Edit</button>
          <button onclick="cpFbDelete(${f.id})" style="background:#fef2f2;border:none;color:#dc2626;font-size:12px;font-weight:600;padding:5px 10px;border-radius:7px;cursor:pointer">🗑 Delete</button>
        </div>
      </div>
      ${f.description ? `<div style="font-size:13px;color:#374151;background:#f8fafc;border-radius:8px;padding:8px 12px;line-height:1.5">"${dtEscape(f.description)}"</div>` : ''}
      <div style="font-size:11px;color:#94a3b8">${date}</div>
    </div>`;
  }).join('') : `<div style="font-size:13px;color:#94a3b8;text-align:center;padding:20px 0">No escalation submitted yet.</div>`;

  const historyCount = history.length;
  return `
    <div style="max-width:560px;margin:0 auto;display:flex;flex-direction:column;gap:0">
      <!-- Tab bar -->
      <div style="display:flex;border-bottom:2px solid #e2e8f0;margin-bottom:16px">
        <button id="cpFbTabNew" onclick="cpFbSwitchTab('new')" style="flex:1;padding:12px 0;border:none;background:none;font-size:13px;font-weight:700;color:#1a56db;border-bottom:2px solid #1a56db;margin-bottom:-2px;cursor:pointer">⭐ Raise Escalation</button>
        <button id="cpFbTabHist" onclick="cpFbSwitchTab('history')" style="flex:1;padding:12px 0;border:none;background:none;font-size:13px;font-weight:600;color:#64748b;border-bottom:2px solid transparent;margin-bottom:-2px;cursor:pointer">📋 Escalation History ${historyCount ? `<span style="background:#1a56db;color:#fff;border-radius:999px;font-size:11px;padding:1px 7px;margin-left:4px">${historyCount}</span>` : ''}</button>
      </div>

      <!-- Past Feedback panel -->
      <div id="cpFbPanelHistory" style="display:none;flex-direction:column;gap:10px">${historyHtml}</div>

      <!-- Submit / Edit Form panel -->
      <div id="cpFbPanelNew" style="display:flex;flex-direction:column;gap:0">
      <div class="cp-card" id="cpFbFormCard">
        <div class="cp-card-head"><h4 id="cpFbFormTitle">⚠️ Raise Your Escalation</h4></div>
        <div style="padding:22px 24px">
          <div style="font-size:13px;color:#64748b;margin-bottom:20px">Raise an escalation to flag an issue with our service.</div>
          <input type="hidden" id="cpFbEditId" value=""/>

          ${handlerSection}

          <div class="form-group" style="margin-bottom:20px">
            <label>📬 Send Escalation To</label>
            <div id="cpFbRecipientList" style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:10px 14px;display:flex;flex-direction:column;gap:8px;margin-top:6px">
              ${recipientRows}
            </div>
          </div>

          <div class="form-group">
            <label>Rating *</label>
            <div class="cp-star-row" id="cpFbStarRow">
              ${[1,2,3,4,5].map(i=>`<span class="cp-star" data-val="${i}" onclick="cpSetRating(${i})" onmouseover="cpPreviewRating(${i})" onmouseout="cpPreviewRating(0)">★</span>`).join('')}
            </div>
            <div id="cpFbRatingLabel" style="font-size:12px;color:#94a3b8;margin-top:2px">Click a star to rate</div>
          </div>

          <div class="form-group">
            <label>Description</label>
            <textarea id="cpFbDesc" rows="4" placeholder="Share your experience — what went well, what could be improved…"></textarea>
          </div>

          <div id="cpFbErr" class="alert error" style="display:none"></div>
          <div style="display:flex;gap:10px">
            <button class="btn btn-primary" style="flex:1;padding:12px" id="cpFbSubmitBtn" onclick="cpSubmitFeedback()">Submit Escalation</button>
            <button class="btn btn-outline" style="padding:12px 16px;display:none" id="cpFbCancelBtn" onclick="cpFbCancelEdit()">Cancel</button>
          </div>
        </div>
      </div>
      </div>
    </div>`;
}

function cpFbSwitchTab(tab){
  const isNew = tab === 'new';
  document.getElementById('cpFbPanelNew').style.display     = isNew ? 'flex' : 'none';
  document.getElementById('cpFbPanelHistory').style.display = isNew ? 'none' : 'flex';
  const tNew  = document.getElementById('cpFbTabNew');
  const tHist = document.getElementById('cpFbTabHist');
  if (tNew)  { tNew.style.color  = isNew ? '#1a56db' : '#64748b'; tNew.style.borderBottomColor  = isNew ? '#1a56db' : 'transparent'; tNew.style.fontWeight  = isNew ? '700' : '600'; }
  if (tHist) { tHist.style.color = isNew ? '#64748b' : '#1a56db'; tHist.style.borderBottomColor = isNew ? 'transparent' : '#1a56db'; tHist.style.fontWeight = isNew ? '600' : '700'; }
}

function cpBuildRecipientRows(hods, selectedEmployeeId, checkedIds){
  const ORDER = ['Abhishek Jain', 'Simran Gurnani'];
  const sorted = [..._cpFbFixed].sort((a, b) => {
    const ai = ORDER.indexOf(a.name), bi = ORDER.indexOf(b.name);
    return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
  });
  const isChecked = id => !checkedIds || checkedIds.includes(String(id));
  const rows = sorted.map(u => `<label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;color:#0f172a;font-weight:600">
      <input type="checkbox" class="cpFbRecipCb" value="${u.id}" ${isChecked(u.id)?'checked':''} style="width:16px;height:16px;cursor:pointer"/>
      <span>${dtEscape(u.name)}</span>
    </label>`);
  // Show a checkbox for each HOD (excluding the selected employee themselves)
  const visibleHods = (hods || []).filter(h => String(h.id) !== String(selectedEmployeeId));
  if (visibleHods.length) {
    visibleHods.forEach(h => {
      rows.push(`<label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;color:#0f172a;font-weight:600">
        <input type="checkbox" class="cpFbRecipCb cpFbHodCb" value="${h.id}" ${isChecked(h.id)?'checked':''} style="width:16px;height:16px;cursor:pointer"/>
        <span>${dtEscape(h.name)} <span style="font-weight:400;color:#64748b">(HOD)</span></span>
      </label>`);
    });
  }
  rows.push(`<div id="cpFbHodRow"></div>`);
  return rows.join('');
}

function cpFbHandlerChange(){
  const sel = document.getElementById('cpFbEmployee');
  if (!sel) return;
  const opt = sel.options[sel.selectedIndex];
  const dept = opt?.dataset.dept || '';
  const selectedId = opt?.value || '';
  const selectedIsHod = opt?.dataset.isHod === '1';
  const hods = selectedIsHod ? [] : cpFbGetHods(dept);
  const visibleHods = hods.filter(h => String(h.id) !== String(selectedId));
  // Remove existing HOD checkboxes (they have class cpFbHodCb) + the placeholder div
  document.querySelectorAll('.cpFbHodCb').forEach(el => el.closest('label')?.remove());
  const hodRow = document.getElementById('cpFbHodRow');
  if (!hodRow) return;
  if (visibleHods.length) {
    const newHtml = visibleHods.map(h => `<label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;color:#0f172a;font-weight:600">
      <input type="checkbox" class="cpFbRecipCb cpFbHodCb" value="${h.id}" checked style="width:16px;height:16px;cursor:pointer"/>
      <span>${dtEscape(h.name)} <span style="font-weight:400;color:#64748b">(HOD)</span></span>
    </label>`).join('');
    hodRow.insertAdjacentHTML('beforebegin', newHtml);
  }
}

// Pre-fill form for editing an existing feedback entry
function cpFbStartEdit(id){
  const card = document.getElementById(`cpFbHistCard-${id}`);
  if (!card) return;
  // Read data from the card's data (re-fetch from API to get full data)
  api(`/api/client-portal/feedback`).then(rows => {
    if (!Array.isArray(rows)) return;
    const f = rows.find(x => x.id === id);
    if (!f) return;
    _cpFbEditId = id;
    _cpFbRating = f.rating;

    // Update form title and button
    document.getElementById('cpFbFormTitle').textContent = '✏️ Edit Escalation';
    document.getElementById('cpFbSubmitBtn').textContent = 'Update Escalation';
    document.getElementById('cpFbCancelBtn').style.display = 'block';
    document.getElementById('cpFbEditId').value = id;

    // Set employee (for single-handler, it's fixed; for multi, set select)
    const empSel = document.getElementById('cpFbEmployee');
    if (empSel.tagName === 'SELECT') {
      empSel.value = f.employee_id;
      cpFbHandlerChange();
    }

    // Set recipients
    const checkedIds = f.recipients ? f.recipients.split(',') : [];
    const empHandler = _cpFbHandlers.find(h => String(h.id) === String(f.employee_id));
    const dept = empHandler?.department || '';
    const hods = empHandler?.is_hod ? [] : cpFbGetHods(dept);
    document.getElementById('cpFbRecipientList').innerHTML = cpBuildRecipientRows(hods, f.employee_id, checkedIds.length ? checkedIds : null);

    // Set rating
    cpSetRating(f.rating);

    // Set description
    document.getElementById('cpFbDesc').value = f.description || '';

    // Switch to form tab and scroll
    cpFbSwitchTab('new');
    document.getElementById('cpFbFormCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
}

function cpFbCancelEdit(){
  _cpFbEditId = null;
  _cpFbRating = 0;
  document.getElementById('cpFbFormTitle').textContent = '⚠️ Raise Your Escalation';
  document.getElementById('cpFbSubmitBtn').textContent = 'Submit Escalation';
  document.getElementById('cpFbCancelBtn').style.display = 'none';
  document.getElementById('cpFbEditId').value = '';
  document.getElementById('cpFbDesc').value = '';
  cpSetRating(0);
  // Reset recipients to all checked
  const handlers = _cpFbHandlers;
  if (handlers.length) {
    const hods = handlers[0].is_hod ? [] : cpFbGetHods(handlers[0].department || '');
    document.getElementById('cpFbRecipientList').innerHTML = cpBuildRecipientRows(hods, handlers[0].id);
  }
}

function cpFbDelete(id){
  showConfirm('This feedback will be permanently deleted.', async () => {
    const r = await api(`/api/client-portal/feedback/${id}`, 'DELETE');
    if (r.error) { showToast(r.error, 'error'); return; }
    const card = document.getElementById(`cpFbHistCard-${id}`);
    if (card) card.remove();
    showToast('Feedback deleted');
    if (_cpFbEditId === id) cpFbCancelEdit();
  });
}

const _cpRatingLabels = ['','Poor','Fair','Good','Very Good','Excellent'];
function cpSetRating(val){
  _cpFbRating = val;
  cpPreviewRating(val);
  const lbl = document.getElementById('cpFbRatingLabel');
  if (lbl) lbl.textContent = val ? `${val}/5 — ${_cpRatingLabels[val]}` : 'Click a star to rate';
}

function cpPreviewRating(val){
  document.querySelectorAll('#cpFbStarRow .cp-star').forEach(s => {
    s.classList.toggle('lit', parseInt(s.dataset.val) <= (val || _cpFbRating));
  });
}

async function cpSubmitFeedback(){
  const err = document.getElementById('cpFbErr');
  err.style.display = 'none';
  const employee_id = document.getElementById('cpFbEmployee')?.value;
  const description = (document.getElementById('cpFbDesc')?.value || '').trim();
  const recipients = Array.from(document.querySelectorAll('.cpFbRecipCb:checked')).map(c => c.value);
  const editId = _cpFbEditId;
  if (!employee_id) { err.textContent = 'Please select an employee.'; err.style.display = 'block'; return; }
  if (!_cpFbRating) { err.textContent = 'Please select a rating.'; err.style.display = 'block'; return; }
  if (!recipients.length) { err.textContent = 'Please select at least one recipient.'; err.style.display = 'block'; return; }
  try {
    let r;
    if (editId) {
      r = await api(`/api/client-portal/feedback/${editId}`, 'PUT', { rating: _cpFbRating, description, recipients });
    } else {
      r = await api('/api/client-portal/feedback', 'POST', { employee_id, rating: _cpFbRating, description, recipients });
    }
    if (r.error) { err.textContent = r.error; err.style.display = 'block'; return; }
    showToast(editId ? '✅ Feedback updated' : '✅ Feedback submitted');
    _cpFbRating = 0;
    await cpLoadFeedbackPage();
    cpFbSwitchTab('history');
  } catch(e) {
    err.textContent = 'Submission failed. Please try again.';
    err.style.display = 'block';
  }
}
</script>
