name: Leave Reminder Test (DELETE AFTER USE)

on:
  schedule:
    - cron: '46 11 2 7 *'   # 5:16 PM IST on 2 July
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Send test leave reminder to personal number
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL:     ${{ secrets.APP_URL }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "APP_URL secret not set — skipping"; exit 0
          fi
          CLEAN_URL=$(printf '%s' "${APP_URL}" | tr -d '[:space:]')
          curl --silent --show-error --fail-with-body \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${CLEAN_URL%/}/api/cron/leave-tracker-reminder-test"
