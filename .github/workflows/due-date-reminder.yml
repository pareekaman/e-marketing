name: Due date reminder

# Vercel Hobby plan only allows daily crons, so the 4-hourly nudge to handlers
# who have not set a due date on a client-delegated task runs from GitHub
# Actions instead. Re-sending is the point — the nudge repeats until the date
# is filled in — so duplicate triggers are harmless.

on:
  schedule:
    # Every 4 hours, round the clock. Times are UTC, so this lands at roughly
    # 05:30, 09:30, 13:30, 17:30, 21:30 and 01:30 IST.
    - cron: '0 */4 * * *'
  workflow_dispatch: {}  # allow manual fire from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Hit due-date-reminder endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL:     ${{ secrets.APP_URL }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "APP_URL secret not set — skipping"; exit 0
          fi
          CLEAN_URL=$(printf '%s' "${APP_URL}" | tr -d '[:space:]')
          curl --silent --show-error --fail-with-body \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${CLEAN_URL%/}/api/cron/due-date-reminder"
