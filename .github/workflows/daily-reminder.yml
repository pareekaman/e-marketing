name: Daily Reminder

# Moved back to vercel.json as a Vercel Cron — Vercel's current Hobby plan
# allows up to 100 cron jobs/project, so the earlier "quota overflow"
# reasoning no longer applies. GitHub Actions' schedule trigger queues on
# shared runners and was firing 1.5-3 hours late every day. Manual dispatch
# stays available here for on-demand testing; the schedule trigger is
# removed so this doesn't also fire and double-send the reminder.
on:
  workflow_dispatch: {}  # allow manual fire from the Actions tab

jobs:
  remind:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Hit daily-reminder endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL:     ${{ secrets.APP_URL }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "APP_URL secret not set — skipping"; exit 0
          fi
          CLEAN_URL=$(printf '%s' "${APP_URL}" | tr -d '[:space:]')
          curl --silent --show-error --fail-with-body \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${CLEAN_URL%/}/api/cron/daily-reminder"
