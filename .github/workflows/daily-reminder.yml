name: Daily Reminder

# Fires daily at 7:30 PM IST (14:00 UTC). Moved here from vercel.json —
# the Vercel Hobby plan only allows 2 cron jobs total, and with
# pending-summary needing two fires a day the daily-reminder + pending-summary
# entries overflowed that quota and stopped firing reliably.
on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch: {}  # allow manual fire from the Actions tab

jobs:
  remind:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Hit daily-reminder endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL:     ${{ secrets.APP_URL }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "APP_URL secret not set — skipping"; exit 0
          fi
          CLEAN_URL=$(printf '%s' "${APP_URL}" | tr -d '[:space:]')
          curl --silent --show-error --fail-with-body \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${CLEAN_URL%/}/api/cron/daily-reminder"
